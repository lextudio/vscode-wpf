<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Outer dark border for definition against any background -->
  <rect x="0.5" y="2.5" width="15" height="11" rx="2.5" fill="#3B0764"/>
  <!-- Main purple banner body -->
  <rect x="1" y="3" width="14" height="10" rx="2" fill="#7E22CE"/>
  <!-- Top gloss highlight (matches the sheen on the logo) -->
  <rect x="2.5" y="3.5" width="11" height="2" rx="1" fill="rgba(255,255,255,0.18)"/>
  <!-- Horizontal stripe near bottom (mirrors the stripe in the original logo) -->
  <rect x="1" y="10" width="14" height="1.5" rx="0" fill="#6B21A8"/>
  <rect x="1" y="10" width="14" height="0.5" fill="rgba(255,255,255,0.2)"/>
  <!-- WPF lettering — bold, white, pixel-snapped -->
  <text x="8" y="9.2"
        text-anchor="middle"
        dominant-baseline="auto"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-weight="900"
        font-size="6"
        letter-spacing="0.4"
        fill="white">WPF</text>
</svg>
